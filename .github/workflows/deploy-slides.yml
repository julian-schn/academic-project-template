name: Deploy Marp to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'presentation/**'
      - 'config.yml'
      - '.github/workflows/deploy-slides.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check-config:
    runs-on: ubuntu-latest
    outputs:
      presentation_enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if presentation is enabled
        id: check
        run: |
          if [ -f config.yml ]; then
            ENABLED=$(grep -A 2 'features:' config.yml | grep 'presentation:' | awk '{print $2}')
            echo "enabled=$ENABLED" >> $GITHUB_OUTPUT
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-config
    if: needs.check-config.outputs.presentation_enabled == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: presentation/package-lock.json

      - name: Install dependencies
        run: |
          cd presentation
          npm ci

      - name: Build Marp presentation
        run: |
          cd presentation
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './presentation/dist'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
