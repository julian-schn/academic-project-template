name: Deploy Slidev to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'presentation/**'
      - 'config.yml'
      - '.github/workflows/deploy-slides.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check-config:
    runs-on: ubuntu-latest
    outputs:
      presentation_enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if presentation is enabled
        id: check
        run: |
          if [ -f config.yml ]; then
            ENABLED=$(grep -A 2 'features:' config.yml | grep 'presentation:' | awk '{print $2}')
            echo "enabled=$ENABLED" >> $GITHUB_OUTPUT
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-config
    if: needs.check-config.outputs.presentation_enabled == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: presentation/package-lock.json

      - name: Install dependencies
        run: |
          cd presentation
          npm ci

      - name: Build Slidev SPA
        run: |
          cd presentation
          REPO_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)
          npm run build -- --base /$REPO_NAME/slides/

      - name: Create index redirect
        run: |
          mkdir -p dist
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Presentation</title>
            <meta http-equiv="refresh" content="0; url=./slides/">
          </head>
          <body>
            <p>Redirecting to <a href="./slides/">presentation</a>...</p>
          </body>
          </html>
          EOF

      - name: Copy build output
        run: |
          cp -r presentation/dist dist/slides

      - name: Setup SPA routing for GitHub Pages
        run: |
          mkdir -p dist/slides/presenter
          mkdir -p dist/slides/overview
          cp dist/slides/index.html dist/slides/presenter/index.html
          cp dist/slides/index.html dist/slides/overview/index.html
          cp dist/slides/index.html dist/slides/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
